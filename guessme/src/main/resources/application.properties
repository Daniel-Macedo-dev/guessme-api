spring.application.name=GuessMe

# google.properties is optional; if absent the image-search feature is silently disabled.
# Provide values via environment variables (GOOGLE_API_KEY, GOOGLE_SEARCH_CX)
# or by copying google.properties.example → google.properties and filling in your keys.
spring.config.import=optional:classpath:google.properties

# CORS origins allowed to call the API.
# For local Vite dev: http://localhost:5173 (default).
# Override via CORS_ALLOWED_ORIGINS env var or by editing this file.
cors.allowed-origins=http://localhost:5173

